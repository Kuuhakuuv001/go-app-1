name: go-app-1-cicd

on:
  workflow_dispatch:
  push:
    paths:
      - src/**
    branches:
      - main
jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.short-sha.outputs.sha }}
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Get short commit sha
        uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with:
          length: 6
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: minhitptit/go-app-1:${{ steps.short-sha.outputs.sha }}

  cd:
    runs-on: self-hosted
    needs: ci
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Install ArgoCD CLI
        uses: clowdhaus/argo-cd-action/@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update image tag
        uses: mikefarah/yq@master
        with:
          cmd: yq -i '.image.tag = "${{ needs.ci.outputs.short-sha }}"' charts/go-app-1/values-dev.yaml
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update image tag to ${{ needs.ci.outputs.short-sha }}"
          file_pattern: charts/go-app-1/values-dev.yaml
      - name: Log in ArgoCD
        shell: bash
        run: |
          argocd login argocd-server.argocd \
            --insecure \
            --grpc-web \
            --username admin \
            --password ${{ secrets.ARGOCD_PASSWORD }}
      - name: Ensure ArgoCD Repo and App
        shell: bash
        run: |
          repo="https://github.com/Kuuhakuuv001/go-app-1.git"
          argocd repo list | grep -q $repo || argocd repo add $repo
          argocd app get go-app-1 || argocd app create go-app-1 \
            --repo $repo \
            --path charts/go-app-1 \
            --dest-namespace dev \
            --dest-server https://kubernetes.default.svc \
            --values values-dev.yaml \
            --revision main \
            --sync-policy manual \
            --sync-option CreateNamespace=true
      - name: ArgoCD app sync
        shell: bash
        run: |
          echo "Deploying image tag: ${{ needs.ci.outputs.short-sha }}"
          argocd app sync go-app-1
          argocd app wait go-app-1 --timeout 180
